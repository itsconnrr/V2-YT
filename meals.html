<!DOCTYPE html>
<html lang="en">
<head>
<script src="lock.js"></script>
<script src="/api/config"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<title>Meals · Connor's Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="google-api.js" defer></script>
<script src="sheets.js" defer></script>
<script src="topbar.js" defer></script>
<style>
:root{--text-primary:#FAFAFA;--text-secondary:#B8B6B0;--text-tertiary:#76746E;--accent:#F4A98A;--font:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",Roboto,Helvetica,Arial,sans-serif;--font-mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:#050506;color:var(--text-secondary);font-family:var(--font);-webkit-font-smoothing:antialiased}
body{min-height:100vh;padding:max(24px,env(safe-area-inset-top)) 18px 90px}
.page{max-width:680px;margin:0 auto}
.dash-title{margin:0 0 2px;font-size:26px;font-weight:700;letter-spacing:-0.025em;background:linear-gradient(180deg,#FFF,#C7C4BC);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.sub{font-size:13px;color:var(--text-tertiary);margin:0 0 18px}
.gate{text-align:center;padding:48px 20px;color:var(--text-tertiary);font-size:14px;line-height:1.6}
.gate a{color:var(--accent);text-decoration:none;font-weight:700}
.status{text-align:center;font-size:12px;color:var(--text-secondary);min-height:16px;margin:4px 0 12px}
.slot{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:16px;padding:14px 16px;margin-bottom:10px;transition:border-color .15s,background .15s}
.slot.done{border-color:rgba(107,227,164,0.22);background:rgba(107,227,164,0.045)}
.slot-head{display:flex;align-items:center;gap:10px}
.slot-time{font-family:var(--font-mono);font-size:12px;color:var(--text-tertiary);min-width:64px}
.slot-name{font-size:16px;font-weight:700;color:var(--text-primary)}
.slot-tag{margin-left:auto;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;white-space:nowrap}
.slot-tag.ok{color:#6BE3A4;background:rgba(107,227,164,0.12)}
.slot-tag.late{color:#F2C063;background:rgba(242,192,99,0.12)}
.slot-tag.early{color:#7DD3FC;background:rgba(125,211,252,0.12)}
.slot-food{margin-top:8px;font-size:14px;color:var(--text-secondary)}
.slot-actual{color:var(--text-tertiary)}
.slot-log{margin-top:12px;width:100%;padding:10px;border-radius:11px;border:1px dashed rgba(255,255,255,0.18);background:transparent;color:var(--text-secondary);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent}
.slot-log:hover{background:rgba(255,255,255,0.04);color:var(--text-primary)}
.slot-edit{margin-top:10px;background:transparent;border:none;color:var(--text-tertiary);font-size:12px;cursor:pointer;font-family:inherit;text-decoration:underline}
.slot-form{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.m-input{flex:1;min-width:150px;padding:11px;border:1px solid rgba(255,255,255,0.1);border-radius:10px;background:rgba(0,0,0,0.3);color:var(--text-primary);font-size:15px;outline:none}
.m-input:focus{border-color:rgba(255,255,255,0.3)}
.m-time{padding:11px;border:1px solid rgba(255,255,255,0.1);border-radius:10px;background:rgba(0,0,0,0.3);color:var(--text-primary);font-size:15px;font-family:inherit}
.m-save{padding:11px 18px;border-radius:10px;border:0;background:linear-gradient(180deg,#FFF,#E8E5DD);color:#0A0A0B;font-weight:700;font-family:inherit;cursor:pointer}
.sheet-link{display:inline-flex;align-items:center;gap:6px;margin-top:14px;color:var(--accent);text-decoration:none;font-size:13px;font-weight:600}
</style>
</head>
<body>
<div class="page">
  <h1 class="dash-title">Meals</h1>
  <p class="sub" id="dateSub">—</p>

  <div id="gate" class="gate" style="display:none">
    Connect your Google account on the <a href="health.html">Health page</a> first, then come back to log your meals.
  </div>

  <div id="main" style="display:none">
    <div class="status" id="status" style="display:none"></div>
    <div id="slots"></div>
    <a id="sheetLink" class="sheet-link" target="_blank" rel="noopener" style="display:none">📄 Open full history in Google Sheets →</a>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  'use strict';
  const SLOTS = [
    { id: 'breakfast', name: 'Breakfast', h: 9,  m: 0  },
    { id: 'snack1',    name: 'Snack',     h: 11, m: 0  },
    { id: 'lunch',     name: 'Lunch',     h: 13, m: 0  },
    { id: 'snack2',    name: 'Snack',     h: 15, m: 30 },
    { id: 'dinner',    name: 'Dinner',    h: 19, m: 0  },
    { id: 'snack3',    name: 'Snack',     h: 21, m: 0  }
  ];
  const $ = (id) => document.getElementById(id);
  const list = $('slots');

  function ymd(d) { return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0'); }
  function logKey() { return 'meals:log:' + ymd(new Date()); }
  function loadLog() { try { return JSON.parse(localStorage.getItem(logKey())) || {}; } catch { return {}; } }
  function saveLog(o) { try { localStorage.setItem(logKey(), JSON.stringify(o)); } catch {} }
  function fmt12(h, m) { const ap = h >= 12 ? 'PM' : 'AM'; let hh = h % 12; if (hh === 0) hh = 12; return hh + ':' + String(m).padStart(2, '0') + ' ' + ap; }
  function hhmmNow() { const d = new Date(); return String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0'); }
  function escapeHtml(s) { return (s || '').replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])); }

  function timing(schedH, schedM, hhmm) {
    const p = hhmm.split(':'); const act = (+p[0]) * 60 + (+p[1]); const sched = schedH * 60 + schedM;
    const d = act - sched;
    if (Math.abs(d) <= 15) return { tag: 'on time', cls: 'ok' };
    const mins = Math.abs(d), h = Math.floor(mins / 60), mm = mins % 60;
    const str = (h > 0 ? h + 'h ' : '') + mm + 'm';
    return d > 0 ? { tag: '+' + str + ' late', cls: 'late' } : { tag: str + ' early', cls: 'early' };
  }
  function setStatus(m) { const e = $('status'); e.textContent = m || ''; e.style.display = m ? 'block' : 'none'; }

  function render() {
    $('dateSub').textContent = new Date().toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric' });
    const log = loadLog();
    list.innerHTML = '';
    SLOTS.forEach(slot => {
      const l = log[slot.id];
      const card = document.createElement('div');
      card.className = 'slot' + (l ? ' done' : '');
      let html = '<div class="slot-head"><div class="slot-time">' + fmt12(slot.h, slot.m) + '</div><div class="slot-name">' + slot.name + '</div>';
      if (l) html += '<span class="slot-tag ' + l.cls + '">' + l.tag + '</span>';
      html += '</div>';
      if (l) {
        html += '<div class="slot-food">' + escapeHtml(l.food) + ' <span class="slot-actual">· ate ' + l.actualDisp + '</span></div>';
        html += '<button class="slot-edit" data-id="' + slot.id + '">edit</button>';
      } else {
        html += '<div class="slot-form" id="form-' + slot.id + '" style="display:none">'
          + '<input class="m-input" id="food-' + slot.id + '" placeholder="What did you eat?" autocomplete="off" spellcheck="false">'
          + '<input class="m-time" id="time-' + slot.id + '" type="time" value="' + hhmmNow() + '">'
          + '<button class="m-save" data-id="' + slot.id + '">Save</button></div>';
        html += '<button class="slot-log" id="logbtn-' + slot.id + '" data-id="' + slot.id + '">+ Log ' + slot.name.toLowerCase() + '</button>';
      }
      card.innerHTML = html;
      list.appendChild(card);
    });
    list.querySelectorAll('.slot-log').forEach(b => b.addEventListener('click', () => openForm(b.dataset.id)));
    list.querySelectorAll('.slot-edit').forEach(b => b.addEventListener('click', () => { const log = loadLog(); delete log[b.dataset.id]; saveLog(log); render(); openForm(b.dataset.id); }));
    list.querySelectorAll('.m-save').forEach(b => b.addEventListener('click', () => save(b.dataset.id)));
    list.querySelectorAll('.m-input').forEach(inp => inp.addEventListener('keydown', e => { if (e.key === 'Enter') { const id = inp.id.replace('food-', ''); save(id); } }));
  }

  function openForm(id) {
    const f = $('form-' + id); const btn = $('logbtn-' + id);
    if (f) { f.style.display = 'flex'; if (btn) btn.style.display = 'none'; const fi = $('food-' + id); if (fi) fi.focus(); }
  }

  async function save(id) {
    const slot = SLOTS.find(s => s.id === id);
    const fi = $('food-' + id), ti = $('time-' + id);
    const food = (fi.value || '').trim();
    const hhmm = ti.value || hhmmNow();
    if (!food) { fi.focus(); return; }
    const t = timing(slot.h, slot.m, hhmm);
    const p = hhmm.split(':');
    const actualDisp = fmt12(+p[0], +p[1]);
    const log = loadLog();
    log[id] = { food, actual: hhmm, actualDisp, tag: t.tag, cls: t.cls };
    saveLog(log);
    render();
    try {
      setStatus('Saving to your sheet…');
      const sid = await Sheets.ensureSheet();
      await Sheets.appendRow(sid, 'Meals', [ymd(new Date()), slot.name, fmt12(slot.h, slot.m), food, actualDisp, t.tag]);
      showSheetLink(sid);
      setStatus('Saved ✓'); setTimeout(() => setStatus(''), 1500);
    } catch (e) {
      const msg = /PERMISSION_DENIED|403|insufficient|scope/i.test(e.message)
        ? 'Logged here. To sync to Google Sheets, reconnect on the Health page (it now needs Sheets access).'
        : 'Logged here, but sheet sync failed: ' + e.message;
      setStatus(msg);
    }
  }

  function showSheetLink(id) { const a = $('sheetLink'); a.href = Sheets.link(id); a.style.display = 'inline-flex'; }

  function gate() {
    const ok = window.GoogleAPI && GoogleAPI.isConnected();
    $('gate').style.display = ok ? 'none' : 'block';
    $('main').style.display = ok ? 'block' : 'none';
    return ok;
  }

  if (gate()) {
    render();
    Sheets.loadId().then(id => { if (id) showSheetLink(id); }).catch(() => {});
  }
});
</script>
</body>
</html>

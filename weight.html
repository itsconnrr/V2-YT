<!DOCTYPE html>
<html lang="en">
<head>
<script src="lock.js"></script>
<script src="/api/config"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<title>Weight · Connor's Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="google-api.js" defer></script>
<script src="sheets.js" defer></script>
<script src="topbar.js" defer></script>
<style>
:root{--text-primary:#FAFAFA;--text-secondary:#B8B6B0;--text-tertiary:#76746E;--accent:#C9A36B;--font:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",Roboto,Helvetica,Arial,sans-serif;--font-mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:#050506;color:var(--text-secondary);font-family:var(--font);-webkit-font-smoothing:antialiased}
body{min-height:100vh;padding:max(24px,env(safe-area-inset-top)) 18px 90px}
.page{max-width:680px;margin:0 auto}
.dash-title{margin:0 0 2px;font-size:26px;font-weight:700;letter-spacing:-0.025em;background:linear-gradient(180deg,#FFF,#C7C4BC);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.sub{font-size:13px;color:var(--text-tertiary);margin:0 0 18px}
.gate{text-align:center;padding:48px 20px;color:var(--text-tertiary);font-size:14px;line-height:1.6}
.gate a{color:var(--accent);text-decoration:none;font-weight:700}
.card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:18px;padding:18px;margin-bottom:14px;box-shadow:0 12px 40px rgba(0,0,0,0.4)}
.wrow{display:flex;gap:10px;align-items:center}
.w-input{flex:1;min-width:0;padding:16px;border:1px solid rgba(255,255,255,0.1);border-radius:12px;background:rgba(0,0,0,0.3);color:var(--text-primary);font-size:30px;font-weight:700;text-align:center;outline:none;font-variant-numeric:tabular-nums;font-family:var(--font-mono)}
.w-input:focus{border-color:rgba(255,255,255,0.3)}
.seg{display:inline-flex;border:1px solid rgba(255,255,255,0.1);border-radius:12px;overflow:hidden;flex-shrink:0}
.seg button{border:0;background:transparent;color:var(--text-tertiary);font-family:inherit;font-size:15px;font-weight:700;padding:16px 16px;cursor:pointer}
.seg button.on{background:rgba(255,255,255,0.12);color:var(--text-primary)}
.note-input{width:100%;margin-top:10px;padding:12px;border:1px solid rgba(255,255,255,0.1);border-radius:11px;background:rgba(0,0,0,0.3);color:var(--text-primary);font-size:14px;outline:none;font-family:inherit}
.note-input:focus{border-color:rgba(255,255,255,0.3)}
.log-btn{width:100%;margin-top:12px;padding:14px;border:0;border-radius:12px;background:linear-gradient(180deg,#FFF,#E8E5DD);color:#0A0A0B;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer}
.status{text-align:center;font-size:12px;color:var(--text-secondary);min-height:16px;margin-top:8px}
.recent-title{font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-tertiary);margin:4px 0 10px}
.rrow{display:flex;justify-content:space-between;align-items:baseline;padding:9px 2px;border-bottom:1px solid rgba(255,255,255,0.05);font-size:14px}
.rrow:last-child{border-bottom:0}
.rrow .v{color:var(--text-primary);font-weight:700;font-variant-numeric:tabular-nums}
.rrow .d{color:var(--text-tertiary);font-family:var(--font-mono);font-size:12px}
.rrow .n{color:var(--text-tertiary);font-size:12px;flex:1;text-align:center}
.sheet-link{display:inline-flex;align-items:center;gap:6px;margin-top:6px;color:var(--accent);text-decoration:none;font-size:13px;font-weight:600}
</style>
</head>
<body>
<div class="page">
  <h1 class="dash-title">Weight</h1>
  <p class="sub" id="dateSub">—</p>

  <div id="gate" class="gate" style="display:none">
    Connect your Google account on the <a href="health.html">Health page</a> first, then come back to log your weight.
  </div>

  <div id="main" style="display:none">
    <div class="card">
      <div class="wrow">
        <input class="w-input" id="weight" type="number" inputmode="decimal" step="0.1" placeholder="0.0">
        <div class="seg" id="unitSeg">
          <button type="button" data-u="lb" class="on">lb</button>
          <button type="button" data-u="kg">kg</button>
        </div>
      </div>
      <input class="note-input" id="note" type="text" placeholder="Note (optional)" autocomplete="off">
      <button class="log-btn" id="logBtn" type="button">Log weight</button>
      <div class="status" id="status"></div>
    </div>

    <div class="card" id="recentCard" style="display:none">
      <div class="recent-title">Recent</div>
      <div id="recent"></div>
      <a id="sheetLink" class="sheet-link" target="_blank" rel="noopener" style="display:none">📄 Full history in Google Sheets →</a>
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  'use strict';
  const $ = (id) => document.getElementById(id);
  let unit = 'lb';

  function ymd(d) { return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0'); }
  function time12() { return new Date().toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' }); }
  function setStatus(m) { $('status').textContent = m || ''; }
  function escapeHtml(s) { return (s || '').replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])); }

  // default unit: last used here, else the water-tracker profile, else lb
  try {
    const saved = localStorage.getItem('dash_weight_unit');
    if (saved === 'kg' || saved === 'lb') unit = saved;
    else { const w = JSON.parse(localStorage.getItem('po_water_v1')); if (w && w.weightUnit) unit = w.weightUnit === 'kg' ? 'kg' : 'lb'; }
  } catch {}
  function setUnit(u) { unit = u; try { localStorage.setItem('dash_weight_unit', u); } catch {} $('unitSeg').querySelectorAll('button').forEach(b => b.classList.toggle('on', b.dataset.u === u)); }

  function gate() {
    const ok = window.GoogleAPI && GoogleAPI.isConnected();
    $('gate').style.display = ok ? 'none' : 'block';
    $('main').style.display = ok ? 'block' : 'none';
    return ok;
  }

  function renderRecent(rows) {
    const data = (rows || []).slice(1).filter(r => r && r.length); // drop header
    if (!data.length) return;
    $('recentCard').style.display = 'block';
    const recent = data.slice(-7).reverse();
    $('recent').innerHTML = recent.map(r => {
      const date = r[0] || '', wt = r[2] || '', un = r[3] || '', note = r[4] || '';
      return '<div class="rrow"><span class="d">' + escapeHtml(date) + '</span><span class="n">' + escapeHtml(note) + '</span><span class="v">' + escapeHtml(wt) + ' ' + escapeHtml(un) + '</span></div>';
    }).join('');
  }

  async function loadRecent() {
    try {
      const id = await Sheets.loadId();
      if (!id) return;
      $('sheetLink').href = Sheets.link(id); $('sheetLink').style.display = 'inline-flex';
      const rows = await Sheets.readRows(id, 'Weight');
      renderRecent(rows);
    } catch (e) { /* not created yet or no access — fine */ }
  }

  async function log() {
    const v = parseFloat($('weight').value);
    if (!(v > 0)) { $('weight').focus(); return; }
    const note = ($('note').value || '').trim();
    const btn = $('logBtn'); btn.disabled = true;
    try {
      setStatus('Saving to your sheet…');
      const id = await Sheets.ensureSheet();
      await Sheets.appendRow(id, 'Weight', [ymd(new Date()), time12(), String(v), unit, note]);
      $('sheetLink').href = Sheets.link(id); $('sheetLink').style.display = 'inline-flex';
      setStatus('Saved ✓'); $('weight').value = ''; $('note').value = '';
      await loadRecent();
      setTimeout(() => setStatus(''), 1500);
    } catch (e) {
      setStatus(/PERMISSION_DENIED|403|insufficient|scope/i.test(e.message)
        ? 'Reconnect on the Health page to grant Google Sheets access, then try again.'
        : 'Save failed: ' + e.message);
    } finally { btn.disabled = false; }
  }

  $('dateSub').textContent = new Date().toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric' });
  $('unitSeg').querySelectorAll('button').forEach(b => b.addEventListener('click', () => setUnit(b.dataset.u)));
  $('logBtn').addEventListener('click', log);
  $('weight').addEventListener('keydown', e => { if (e.key === 'Enter') log(); });

  if (gate()) { setUnit(unit); loadRecent(); }
});
</script>
</body>
</html>
